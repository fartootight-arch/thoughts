<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Thoughts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design system tokens ──────────────────────── */
    :root {
      --brand:        #f97316;
      --brand-dark:   #ea6c0a;
      --brand-glow:   rgba(249,115,22,0.15);
      --nav-height:   52px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Mobile touch: eliminate 300ms tap delay on all interactive elements ── */
    button, a, input, textarea, select {
      touch-action: manipulation;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 40px;
    }

    /* PIN screen */
    #pinScreen {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 10001; /* above nav (9999) so nav can't intercept touches */
      padding: 32px;
    }

    #pinScreen h2 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
    }

    #pinScreen p {
      font-size: 14px;
      color: #555;
      text-align: center;
    }

    .pin-dots {
      display: flex;
      gap: 16px;
    }

    .pin-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #333;
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .pin-dot.filled {
      background: var(--brand);
      border-color: var(--brand);
    }

    .pin-dot.error {
      background: #ff4a4a;
      border-color: #ff4a4a;
    }

    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 300px;
    }

    .pin-key {
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 18px;
      color: #fff;
      font-size: 26px;
      font-weight: 600;
      padding: 22px 0;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      transition: background 0.1s, transform 0.1s;
    }

    .pin-key:active { background: #2a2a2a; transform: scale(0.94); }
    .pin-key.del { font-size: 20px; color: #aaa; }
    .pin-key.empty { visibility: hidden; pointer-events: none; }

    #pinError {
      font-size: 14px;
      color: #ff4a4a;
      min-height: 20px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #fff;
      letter-spacing: -0.5px;
      padding-top: calc(var(--nav-height) + 8px);
    }

    /* API key banner */
    #apiBanner {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 20px;
    }

    #apiBanner .banner-label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #apiBanner .banner-row {
      display: flex;
      gap: 8px;
    }

    #apiKeyInput {
      flex: 1;
      background: #0f0f0f;
      border: 2px solid #2a2a2a;
      border-radius: 50px;
      color: #fff;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      font-family: monospace;
    }

    #apiKeyInput::placeholder { color: #444; }
    #apiKeyInput:focus { border-color: #555; }

    #saveKeyBtn {
      background: #2a2a2a;
      border: 2px solid #333;
      border-radius: 50px;
      color: #aaa;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    #saveKeyBtn:active { transform: scale(0.95); }
    #saveKeyBtn.saved { border-color: #4aff9e; color: #4aff9e; }

    #bannerCollapsed {
      display: none;
      justify-content: space-between;
      align-items: center;
    }

    #bannerCollapsed span {
      font-size: 13px;
      color: #4aff9e;
      font-weight: 600;
    }

    #editKeyBtn {
      background: none;
      border: none;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      -webkit-tap-highlight-color: transparent;
    }

    #editKeyBtn:active { color: #aaa; }

    /* Categories */
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .cat-btn {
      padding: 14px 20px;
      border-radius: 50px;
      border: 2px solid #333;
      background: #1a1a1a;
      color: #aaa;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .cat-btn.active {
      background: var(--color);
      border-color: var(--color);
      color: #fff;
    }

    .cat-btn:active { transform: scale(0.95); }

    /* Add category */
    .add-cat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .add-cat-row input {
      flex: 1;
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 50px;
      color: #fff;
      font-size: 16px;
      padding: 12px 18px;
      outline: none;
    }

    .add-cat-row input::placeholder { color: #555; }
    .add-cat-row input:focus { border-color: #555; }

    .add-cat-row button {
      background: #2a2a2a;
      border: 2px solid #333;
      border-radius: 50px;
      color: #aaa;
      font-size: 22px;
      width: 50px;
      height: 50px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .add-cat-row button:active { transform: scale(0.95); }

    /* Textarea */
    textarea {
      width: 100%;
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 20px;
      color: #fff;
      font-size: 18px;
      line-height: 1.5;
      padding: 16px;
      resize: none;
      outline: none;
      min-height: 130px;
      font-family: inherit;
    }

    textarea::placeholder { color: #444; }
    textarea:focus { border-color: #555; }

    /* Mic button */
    .input-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    .input-wrap textarea {
      padding-bottom: 64px;
    }

    #micBtn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: #2a2a2a;
      font-size: 24px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #micBtn:active { transform: scale(0.93); }

    #micBtn.recording {
      background: #ff4a4a;
      animation: pulse 1s infinite;
    }

    #micBtn.transcribing {
      background: #ffb84a;
      animation: spin 1s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,74,74,0.5); }
      50%       { box-shadow: 0 0 0 12px rgba(255,74,74,0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #micStatus {
      font-size: 13px;
      color: #888;
      min-height: 20px;
      margin-bottom: 12px;
      text-align: center;
    }

    #micStatus.error { color: #ff4a4a; }

    /* Save button */
    #saveBtn {
      width: 100%;
      padding: 20px;
      border-radius: 20px;
      border: none;
      background: var(--brand);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 30px;
    }

    #saveBtn:disabled {
      background: #2a2a2a;
      color: #444;
      cursor: default;
    }

    #saveBtn:not(:disabled):active { transform: scale(0.97); }

    /* Filter bar */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 12px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 10px 16px;
      border-radius: 50px;
      border: 2px solid #2a2a2a;
      background: transparent;
      color: #666;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn.active {
      border-color: var(--color, #4a9eff);
      color: var(--color, #4a9eff);
    }

    /* Thoughts list */
    .thoughts-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .thought-card {
      background: #1a1a1a;
      border-left: 4px solid var(--color);
      border-radius: 16px;
      padding: 16px;
    }

    .thought-meta {
      font-size: 11px;
      color: #444;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .thought-cat-label {
      font-weight: 700;
      font-size: 12px;
      color: var(--color);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .thought-text {
      font-size: 17px;
      line-height: 1.5;
      color: #e0e0e0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #333;
      font-size: 20px;
      cursor: pointer;
      padding: 0 0 0 8px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .delete-btn:active { color: #ff4a4a; }

    .empty-state {
      text-align: center;
      color: #333;
      font-size: 16px;
      padding: 40px 0;
    }

    .divider {
      border: none;
      border-top: 1px solid #222;
      margin: 24px 0;
    }

    /* Organise button */
    #organiseBtn {
      width: 100%;
      padding: 20px;
      border-radius: 20px;
      border: 2px solid #333;
      background: #1a1a1a;
      color: #c44aff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 30px;
    }

    #organiseBtn:active { transform: scale(0.97); background: #222; }
    #organiseBtn:disabled { color: #444; border-color: #222; cursor: default; }

    /* Organise modal */
    #organiseModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 998;
      padding: 20px;
      overflow-y: auto;
    }

    #organiseModal.open { display: flex; flex-direction: column; }

    .modal-inner {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      margin: auto;
      flex-shrink: 0;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: #c44aff;
    }

    #closeModal {
      background: #2a2a2a;
      border: none;
      color: #aaa;
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #closeModal:active { background: #333; }

    #organiseResult {
      font-size: 16px;
      line-height: 1.7;
      color: #ddd;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #organiseResult .loading {
      text-align: center;
      color: #555;
      padding: 40px 0;
      font-size: 18px;
    }

    /* Simple markdown rendering */
    #organiseResult h2, #organiseResult h3 {
      color: #fff;
      margin: 16px 0 8px;
    }

    #organiseResult strong { color: #fff; }
    #organiseResult em { color: #c44aff; font-style: normal; }
  </style>
  <style>
    /* ── Global nav bar ───────────────────────────── */

      display: flex;

      width: 28px; height: 28px;

  </style>
</head>
<body>

  <nav class="jason-nav">

  <!-- PIN screen -->
  <div id="pinScreen">
    <h2 id="pinTitle">Thoughts</h2>
    <p id="pinSubtitle">Enter your PIN</p>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>

      <button class="pin-key" onclick="pinPress('1')">1</button>

      <button class="pin-key del" onclick="pinDelete()">⌫</button>

  </div>

  <!-- Main app (hidden until unlocked) -->
  <div id="app" style="display:none">

  <h1>Thoughts</h1>

  <!-- Gemini API key -->
  <div id="apiBanner">
    <div id="bannerExpanded">
      <div class="banner-label">Gemini API Key</div>
      <div class="banner-row">
        <input type="password" id="apiKeyInput" placeholder="Paste your API key..." autocomplete="off">
        <button id="saveKeyBtn" onclick="saveApiKey()">Save</button>
      </div>
    </div>
    <div id="bannerCollapsed">
      <span>🔑 API Key saved</span>
      <button id="editKeyBtn" onclick="editApiKey()">Change</button>
    </div>
  </div>

  <!-- Categories picker -->
  <div class="categories" id="categories"></div>

  <!-- Add new category -->
  <div class="add-cat-row">
    <input type="text" id="newCatInput" placeholder="New category..." maxlength="20">
    <button onclick="addCategory()" title="Add category">+</button>
  </div>

  <!-- Input area -->
  <div class="input-wrap">
    <textarea id="thoughtInput" placeholder="What's on your mind?" rows="5"></textarea>
    <button id="micBtn" onclick="toggleMic()" title="Speak your thought">🎤</button>

  <div id="micStatus"></div>
  <button id="saveBtn" onclick="saveThought()" disabled>Save Thought</button>

  <!-- Organise -->

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDiu51QCp3RW9JWkzziDMFtK96kS02QeHk",
    authDomain: "familyvault-ffea8.firebaseapp.com",
    projectId: "familyvault-ffea8",
    storageBucket: "familyvault-ffea8.firebasestorage.app",
    messagingSenderId: "142896317420",
    appId: "1:142896317420:web:9406c5eb75fcfeaaeef6c9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  const PALETTE = [
    '#4a9eff', '#ff6b4a', '#4aff9e', '#ffb84a',
    '#c44aff', '#ff4a9e', '#4affee', '#ffd44a'
  ];

  let thoughts = [];
  let categories = ['Idea', 'Feeling', 'Todo', 'Random'];
  let selectedCat = null;
  let filterCat = 'all';

  // --- API Key (stays local, device-specific is fine) ---
  function loadApiKey() {
    if (localStorage.getItem('gemini_api_key')) showBannerCollapsed();
  }

  window.saveApiKey = function() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    localStorage.setItem('gemini_api_key', key);
    document.getElementById('apiKeyInput').value = '';
    showBannerCollapsed();
  };

  window.editApiKey = function() {
    document.getElementById('bannerCollapsed').style.display = 'none';
    document.getElementById('bannerExpanded').style.display = 'block';
    document.getElementById('apiKeyInput').focus();
  };

  function showBannerCollapsed() {
    document.getElementById('bannerExpanded').style.display = 'none';
    document.getElementById('bannerCollapsed').style.display = 'flex';
  }

  // --- Core ---
  function catColor(cat) {
    const idx = categories.indexOf(cat);
    return PALETTE[idx % PALETTE.length];
  }

  function renderCategories() {
    const el = document.getElementById('categories');
    el.innerHTML = '';
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (selectedCat === cat ? ' active' : '');
      btn.style.setProperty('--color', catColor(cat));
      btn.textContent = cat;
      btn.onclick = () => selectCat(cat);
      el.appendChild(btn);
    });
    updateSaveBtn();
  }

  function renderFilters() {
    const el = document.getElementById('filterRow');
    el.innerHTML = '';

    const all = document.createElement('button');
    all.className = 'filter-btn' + (filterCat === 'all' ? ' active' : '');
    all.style.setProperty('--color', '#4a9eff');
    all.textContent = 'All';
    all.onclick = () => { filterCat = 'all'; renderFilters(); renderThoughts(); };
    el.appendChild(all);

    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (filterCat === cat ? ' active' : '');
      btn.style.setProperty('--color', catColor(cat));
      btn.textContent = cat;
      btn.onclick = () => { filterCat = cat; renderFilters(); renderThoughts(); };
      el.appendChild(btn);
    });
  }

  function renderThoughts() {
    const el = document.getElementById('thoughtsList');
    const list = (filterCat === 'all' ? [...thoughts] : thoughts.filter(t => t.cat === filterCat))
      .sort((a, b) => b.ts - a.ts);

    if (list.length === 0) {
      el.innerHTML = '<div class="empty-state">No thoughts yet</div>';
      return;
    }

    el.innerHTML = '';
    list.forEach(t => {
      const card = document.createElement('div');
      card.className = 'thought-card';
      card.style.setProperty('--color', catColor(t.cat));

      const date = new Date(t.ts).toLocaleDateString(undefined, {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      card.innerHTML = `
        <div class="thought-meta">
          <span class="thought-cat-label">${t.cat}</span>
          <span style="display:flex;align-items:center;gap:4px;">
            <span>${date}</span>
            <button class="delete-btn" data-id="${t.id}" title="Delete">×</button>
          </span>
        </div>
        <div class="thought-text">${escHtml(t.text)}</div>
      `;
      card.querySelector('.delete-btn').onclick = () => deleteThought(t.id);
      el.appendChild(card);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function selectCat(cat) {
    selectedCat = selectedCat === cat ? null : cat;
    renderCategories();
  }

  function updateSaveBtn() {
    const btn = document.getElementById('saveBtn');
    const hasText = document.getElementById('thoughtInput').value.trim().length > 0;
    btn.disabled = !(selectedCat && hasText);
    btn.style.background = (selectedCat && hasText) ? catColor(selectedCat) : '';
  }

  // --- Firestore operations ---
  window.saveThought = async function() {
    const text = document.getElementById('thoughtInput').value.trim();
    if (!text || !selectedCat) return;
    document.getElementById('thoughtInput').value = '';
    updateSaveBtn();
    await addDoc(collection(db, 'thoughts'), { cat: selectedCat, text, ts: Date.now() });
  };

  async function deleteThought(id) {
    await deleteDoc(doc(db, 'thoughts', id));
  }

  window.addCategory = async function() {
    const input = document.getElementById('newCatInput');
    const name = input.value.trim();
    if (!name || categories.includes(name)) { input.focus(); return; }
    categories = [...categories, name];
    input.value = '';
    await setDoc(doc(db, 'meta', 'config'), { categories });
    renderCategories();
    renderFilters();
  };

  async function loadCategories() {
    const snap = await getDoc(doc(db, 'meta', 'config'));
    if (snap.exists()) categories = snap.data().categories;
    else await setDoc(doc(db, 'meta', 'config'), { categories });
  }

  // Real-time thoughts listener
  function subscribeThoughts() {
    onSnapshot(collection(db, 'thoughts'), snap => {
      thoughts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderThoughts();
      renderFilters();
    });
  }

  document.getElementById('newCatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.addCategory();
  });

  document.getElementById('thoughtInput').addEventListener('input', updateSaveBtn);

  // --- Gemini transcription via MediaRecorder ---
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;

  const micBtn = document.getElementById('micBtn');
  const micStatus = document.getElementById('micStatus');

  function setMicStatus(msg, isError) {
    micStatus.textContent = msg;
    micStatus.className = isError ? 'error' : '';
  }

  window.toggleMic = async function() {
    if (isRecording) {
      stopRecording();
    } else {
      await startRecording();
    }
  };

  async function startRecording() {
    const apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) {
      setMicStatus('Add your Gemini API key above first', true);
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];

      // Pick best supported format
      const mimeType = ['audio/webm', 'audio/mp4', 'audio/ogg']
        .find(m => MediaRecorder.isTypeSupported(m)) || '';

      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); transcribe(); };
      mediaRecorder.start();

      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.textContent = '⏹';
      setMicStatus('Recording... tap to stop');
    } catch (err) {
      setMicStatus('Mic access denied', true);
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.classList.add('transcribing');
    micBtn.textContent = '⏳';
    setMicStatus('Transcribing...');
  }

  async function transcribe() {
    const apiKey = localStorage.getItem('gemini_api_key');
    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });

    // Convert blob to base64
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });

    const mimeType = blob.type.split(';')[0] || 'audio/webm';

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                { text: 'Transcribe this audio exactly as spoken. Return only the transcribed text, nothing else.' },
                { inline_data: { mime_type: mimeType, data: base64 } }
              ]
            }]
          })
        }
      );

      const json = await res.json();

      if (!res.ok) {
        const msg = json?.error?.message || 'API error';
        setMicStatus(msg, true);
      } else {
        const transcribed = json?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
        if (transcribed) {
          const ta = document.getElementById('thoughtInput');
          const existing = ta.value.trim();
          ta.value = existing ? existing + ' ' + transcribed : transcribed;
          updateSaveBtn();
          setMicStatus('');
        } else {
          setMicStatus('Nothing heard — try again', true);
        }
      }
    } catch (err) {
      setMicStatus('Network error', true);
    }

    micBtn.classList.remove('transcribing');
    micBtn.textContent = '🎤';
  }

  // --- Organise My Thoughts ---
  window.organiseThoughts = async function() {
    if (thoughts.length === 0) return;

    const apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) { alert('Add your Gemini API key first.'); return; }

    document.getElementById('organiseModal').classList.add('open');
    document.getElementById('organiseResult').innerHTML = '<div class="loading">Thinking...</div>';

    const thoughtText = thoughts.map(t => `[${t.cat}] ${t.text}`).join('\n');

    const prompt = `Here are my personal thoughts, each tagged with a category:\n\n${thoughtText}\n\nPlease analyse these and give me:\n1. **Key Themes** — what's really on my mind\n2. **Patterns** — anything recurring or connected\n3. **Actionable Items** — anything I should actually do\n4. **One Insight** — something I might not have noticed myself\n\nBe direct, warm, and concise. No fluff.`;

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }]
          })
        }
      );

      const json = await res.json();

      if (!res.ok) {
        document.getElementById('organiseResult').textContent = json?.error?.message || 'API error';
        return;
      }

      const raw = json?.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';
      document.getElementById('organiseResult').innerHTML = renderMarkdown(raw);

    } catch (err) {
      document.getElementById('organiseResult').textContent = 'Network error — try again.';
    }
  }

  window.closeOrganise = function() {
    document.getElementById('organiseModal').classList.remove('open');
  };

  // Basic markdown → HTML (bold, headings, bullets)
  function renderMarkdown(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^[\-\*] (.+)$/gm, '• $1')
      .replace(/\n{2,}/g, '\n\n');
  }

  // --- PIN ---
  let pinEntry = '';
  const PIN_KEY = 'thoughts_pin';

  window.pinPress = function(digit) {
    if (pinEntry.length >= 4) return;
    pinEntry += digit;
    updatePinDots();
    if (pinEntry.length === 4) setTimeout(checkPin, 80);
  }

  window.pinDelete = function() {
    pinEntry = pinEntry.slice(0, -1);
    updatePinDots();
    document.getElementById('pinError').textContent = '';
  }

  function updatePinDots(state) {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('d' + i);
      dot.className = 'pin-dot';
      if (state === 'error') dot.classList.add('error');
      else if (i < pinEntry.length) dot.classList.add('filled');
    }
  }

  function checkPin() {
    const stored = localStorage.getItem(PIN_KEY);
    if (!stored) {
      // First time — set PIN mode
      if (!window._pinConfirm) {
        window._pinConfirm = pinEntry;
        pinEntry = '';
        document.getElementById('pinSubtitle').textContent = 'Confirm your PIN';
        updatePinDots();
        return;
      }
      if (pinEntry === window._pinConfirm) {
        localStorage.setItem(PIN_KEY, pinEntry);
        unlock();
      } else {
        window._pinConfirm = null;
        pinEntry = '';
        document.getElementById('pinSubtitle').textContent = 'Enter your PIN';
        updatePinDots('error');
        document.getElementById('pinError').textContent = 'PINs didn\'t match — try again';
        setTimeout(() => { updatePinDots(); document.getElementById('pinError').textContent = ''; }, 1000);
      }
    } else {
      if (pinEntry === stored) {
        unlock();
      } else {
        pinEntry = '';
        updatePinDots('error');
        document.getElementById('pinError').textContent = 'Wrong PIN';
        setTimeout(() => { updatePinDots(); document.getElementById('pinError').textContent = ''; }, 1000);
      }
    }
  }

  function unlock() {
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  }

  // If returning from a mobile Google auth redirect, skip PIN and go straight in
  if (sessionStorage.getItem('pending_init') === '1') {
    sessionStorage.removeItem('pending_init');
    onAuthStateChanged(auth, user => {
      if (user) unlock();
    });
  }

  // Handle return from mobile redirect sign-in (fires on page reload after redirect)
  getRedirectResult(auth).then(result => {
    if (result?.user) {
      // Came back from Google redirect on mobile — if PIN was already solved store a
      // flag so initApp doesn't need to sign in again (onAuthStateChanged will fire).
      sessionStorage.setItem('auth_redirect_done', '1');
    }
  }).catch(() => {});

  async function getOrSignIn() {
    return new Promise((resolve, reject) => {
      const unsub = onAuthStateChanged(auth, async (user) => {
        unsub();
        if (user) { resolve(user); return; }

        // Not signed in — try popup first (works on desktop)
        try {
          const result = await signInWithPopup(auth, googleProvider);
          resolve(result.user);
        } catch (err) {
          // On mobile, popups are blocked — fall back to redirect
          const mobileBlocked = err.code === 'auth/popup-blocked'
            || err.code === 'auth/popup-closed-by-user'
            || err.code === 'auth/cancelled-popup-request';
          if (mobileBlocked) {
            // Store the fact we need to re-init after redirect comes back
            sessionStorage.setItem('pending_init', '1');
            await signInWithRedirect(auth, googleProvider);
            // Page will reload; onAuthStateChanged will fire with the user on return
          } else {
            reject(err);
          }
        }
      });
    });
  }

  async function initApp() {
    await getOrSignIn();
    loadApiKey();
    await loadCategories();
    renderCategories();
    renderFilters();
    subscribeThoughts();
  }

  // Show correct PIN prompt on load
  if (!localStorage.getItem(PIN_KEY)) {
    document.getElementById('pinSubtitle').textContent = 'Create a 4-digit PIN';
  }

  // Init (app init is deferred until after PIN)
</script>
</body>
</html>
